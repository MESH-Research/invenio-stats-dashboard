name: Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  # schedule:
    # * is a special character in YAML so you have to quote this string
    # - cron: "0 3 * * 6"
  workflow_dispatch:
    inputs:
      reason:
        description: "Reason"
        required: false
        default: "Manual trigger"

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          submodules: true

      - name: Set up Python 3.12
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12.x'

      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0

      - name: Install python dependencies
        run: |
          uv sync --frozen --all-extras

      - name: Apply patches
        run: |
          chmod +x apply_patches.sh
          ./apply_patches.sh

      - name: set up docker
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Set up Docker Compose
        run: |
          sudo apt-get update
          sudo apt-get install -y docker-compose

      - name: Run Python tests
        env:
          PYTHONWARNINGS: "ignore::DeprecationWarning,ignore::PendingDeprecationWarning,ignore::UserWarning"
        run: |
          chmod +x run-tests.sh
          bash run-tests.sh -S

      - name: Use Node.js 20.x
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20.x
          cache: pnpm

      - name: Enable Corepack (pnpm from package.json packageManager)
        run: corepack enable

      - name: Install Node.js dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint JavaScript
        run: pnpm run lint

      - name: Run JavaScript tests
        run: pnpm test -- --passWithNoTests --silent

      - name: Run JavaScript tests with coverage
        run: pnpm test -- --coverage --passWithNoTests --silent

      - name: Upload coverage reports
        uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de # v5.5.2
        with:
          files: coverage/lcov.info
          flags: invenio-stats-dashboard
          name: invenio-stats-dashboard-coverage
          fail_ci_if_error: false
